<!doctype html>
<html lang="en" style="background-color: #0B1020;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- App Info -->
    <title>MarketLingo - Aerospace Edition</title>
    <meta name="description" content="Master aerospace industry knowledge in 6 months with daily lessons, games, and real-time news" />
    <meta name="author" content="MarketLingo" />
    <meta name="theme-color" content="#0A1628" />
    
    <!-- iOS Specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MarketLingo" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="MarketLingo - Aerospace Edition" />
    <meta property="og:description" content="Master aerospace industry knowledge in 6 months with daily lessons, games, and real-time news" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MarketLingo" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:title" content="MarketLingo - Aerospace Edition" />
    <meta name="twitter:description" content="Master aerospace industry knowledge in 6 months" />
    
    <!-- Safe Area Insets for iOS -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      /* Prevent overscroll white bands - force dark background everywhere */
      html, body, #root {
        background-color: #0B1020 !important;
        overscroll-behavior: none;
        overscroll-behavior-y: none;
      }
      /* iOS-specific overscroll prevention */
      @supports (-webkit-touch-callout: none) {
        html, body {
          height: 100%;
          overflow: auto;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
  </head>

  <body style="background-color: #0B1020; margin: 0; padding: 0; overscroll-behavior: none;">
    <div id="root" style="background-color: #0B1020; min-height: 100vh; min-height: 100dvh;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
